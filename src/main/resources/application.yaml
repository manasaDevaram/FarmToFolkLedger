spring:
  application:
    name: farmtofolk-ledger

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/farmtofolk}
    username: ${DB_USERNAME:manasadevaram}
    password: ${DB_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false

  cache:
    type: redis

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}

    show-sql: ${JPA_SHOW_SQL:true}

    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}

storage:
  s3:
    region: ${AWS_REGION:ap-south-1}
    bucket: ${AWS_S3_BUCKET:}
    access-key: ${AWS_ACCESS_KEY_ID:dummy-access-key}
    secret-key: ${AWS_SECRET_ACCESS_KEY:dummy-secret-key}
    presigned-url-expiry-minutes: ${AWS_S3_PRESIGNED_EXPIRY_MINUTES:10}

app:
  security:
    jwt-secret: ${JWT_SECRET:change-this-development-secret-to-at-least-32-bytes}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
      name: ${BOOTSTRAP_ADMIN_NAME:FarmToFolk Admin}
      phone: ${BOOTSTRAP_ADMIN_PHONE:}
      email: ${BOOTSTRAP_ADMIN_EMAIL:}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:}
